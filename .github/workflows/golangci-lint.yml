name: golangci-lint

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    name: golangci-lint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'
      - name: Install dependencies
        run: go mod download
      - name: Build
        run: go build ./...
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
